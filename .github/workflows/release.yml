name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out code (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -DBUILD_SHARED_LIBS=ON
          -DFIZZIKS_BUILD_TESTS=OFF
          -DFIZZIKS_USE_GLM=OFF
          -DCMAKE_INSTALL_PREFIX=package

      - name: Build
        run: cmake --build build --config Release

      - name: Install
        run: cmake --install build --config Release

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path package/* `
            -DestinationPath Fizziks-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Fizziks-${{ github.ref_name }}.zip